<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesla RC Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #121212;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .main-container { display: flex; flex: 1; }
        .left-panel {
            width: 40%;
            padding: 20px;
            box-sizing: border-box;
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #1a1a1a;
        }
        .car-view, .status-data, .debug-box {
            border: 1px solid #333;
            border-radius: 10px;
            background: #222;
            padding: 14px;
        }
        .car-view { text-align: center; }
        .car-body {
            width: 90px;
            height: 150px;
            background: #333;
            border: 3px solid #00ffcc;
            border-radius: 15px;
            position: relative;
            margin: 10px auto 0;
        }
        .wheel {
            width: 14px;
            height: 32px;
            background: #555;
            border: 2px solid #fff;
            border-radius: 4px;
            position: absolute;
            transform-origin: center;
            transition: transform 0.02s linear;
        }
        .wheel.front-left { top: 15px; left: -20px; }
        .wheel.front-right { top: 15px; right: -20px; }
        .wheel.rear-left { bottom: 15px; left: -20px; }
        .wheel.rear-right { bottom: 15px; right: -20px; }

        .data-item {
            font-size: 1.05rem;
            margin: 6px 0;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }
        .gear-highlight { font-weight: bold; color: #ffcc00; font-size: 2rem; }
        .status-msg { color: #ffcc00; font-weight: bold; text-align: center; font-size: 1.05rem; }
        .right-panel {
            width: 60%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
        }
        .camera-title {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 1rem;
            z-index: 10;
            border: 1px solid #00ffcc;
        }
        .camera-stream {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0a0a0a;
        }
        .indicator {
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .bg-on { background: #00ffcc; color: #000; }
        .bg-off { background: #444; color: #888; }
        .small { font-size: 0.92rem; color: #bbb; word-break: break-all; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="left-panel">
            <div id="connection-status" class="status-msg">🔌 연결 대기 중...</div>

            <div class="car-view">
                <h3 style="margin:0 0 5px 0;">[ 조향 표시 ]</h3>
                <div class="car-body">
                    <div id="wheel-fl" class="wheel front-left"></div>
                    <div id="wheel-fr" class="wheel front-right"></div>
                    <div class="wheel rear-left"></div>
                    <div class="wheel rear-right"></div>
                </div>
            </div>

            <div class="status-data">
                <div class="data-item">
                    <span>엔진</span>
                    <span id="engine-state" class="indicator bg-off">ENGINE OFF</span>
                </div>
                <div class="data-item">
                    <span>기어</span>
                    <span id="current-gear" class="gear-highlight">PARK</span>
                </div>
                <div class="data-item">
                    <span>페달</span>
                    <span id="pedal-status">0% (중립)</span>
                </div>
                <div class="data-item" style="background:#1e2d24;border:1px solid #00ffcc;">
                    <span style="color:#00ffcc;font-weight:bold;">모터 출력</span>
                    <span id="motor-status" style="color:#00ffcc;font-weight:bold;">L: 0.00 / R: 0.00</span>
                </div>
                <div class="data-item">
                    <span>LED</span>
                    <span id="led-state" class="indicator bg-off">OFF</span>
                </div>
                <div class="data-item">
                    <span>초음파</span>
                    <span id="sensor-status" style="color:#ffcc00;">A: 0.0cm / B: 0.0cm</span>
                </div>
            </div>

            <div class="debug-box">
                <div class="data-item"><span>Pi 연결</span><span id="pi-status" class="indicator bg-off">OFF</span></div>
                <div class="data-item"><span>휠 연결</span><span id="wheel-status" class="indicator bg-off">OFF</span></div>
                <div class="small">카메라: 전방 고정</div>
                <div class="small" id="cam-url"></div>
                <div class="small" id="error-text">에러 없음</div>
            </div>
        </div>

        <div class="right-panel">
            <div class="camera-title" id="cam-label">🎥 전방 카메라</div>
            <img id="webcam-video" class="camera-stream" src="" alt="카메라 라이브 스트림">
        </div>
    </div>

    <script>
        const RASPBERRY_PI_IP = "192.168.0.219";
        const FRONT_CAM_URL = `http://${RASPBERRY_PI_IP}:8080/front.mjpg`;

        const videoElement = document.getElementById('webcam-video');
        const camLabel = document.getElementById('cam-label');
        const gearLabel = document.getElementById('current-gear');
        const pedalLabel = document.getElementById('pedal-status');
        const motorLabel = document.getElementById('motor-status');
        const statusMsg = document.getElementById('connection-status');
        const engineLabel = document.getElementById('engine-state');
        const ledLabel = document.getElementById('led-state');
        const sensorLabel = document.getElementById('sensor-status');
        const wheelFL = document.getElementById('wheel-fl');
        const wheelFR = document.getElementById('wheel-fr');
        const piStatus = document.getElementById('pi-status');
        const wheelStatus = document.getElementById('wheel-status');
        const camUrl = document.getElementById('cam-url');
        const errorText = document.getElementById('error-text');

        camUrl.innerText = FRONT_CAM_URL;
        videoElement.src = FRONT_CAM_URL + `?t=${Date.now()}`;

        function setIndicator(el, on, onText, offText="OFF") {
            el.innerText = on ? onText : offText;
            el.className = `indicator ${on ? 'bg-on' : 'bg-off'}`;
        }

        const wsHost = window.location.hostname || "127.0.0.1";
        const ws = new WebSocket(`ws://${wsHost}:8765`);

        ws.onopen = () => {
            statusMsg.innerText = "🟢 대시보드 연결됨";
            statusMsg.style.color = "#00ffcc";
        };

        ws.onclose = () => {
            statusMsg.innerText = "❌ 대시보드 연결 종료";
            statusMsg.style.color = "#ff3333";
        };

        ws.onerror = () => {
            statusMsg.innerText = "❌ 웹소켓 연결 실패";
            statusMsg.style.color = "#ff3333";
        };

        videoElement.onerror = () => {
            camLabel.innerText = "⚠️ 전방 카메라 연결 실패";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            setIndicator(engineLabel, data.engine_on, "ENGINE ON", "ENGINE OFF");
            setIndicator(ledLabel, data.led_on, "LIGHT ON", "OFF");
            setIndicator(piStatus, data.pi_connected, "ON", "OFF");
            setIndicator(wheelStatus, data.wheel_connected, "ON", "OFF");

            gearLabel.innerText = data.gear;
            gearLabel.style.color =
                data.gear === "REAR" ? "#ff3333" :
                data.gear === "DRIVE" ? "#00ffcc" : "#ffcc00";

            const steerDeg = Math.round(((data.steer - 128) / 128) * 40);
            wheelFL.style.transform = `rotate(${steerDeg}deg)`;
            wheelFR.style.transform = `rotate(${steerDeg}deg)`;

            if (data.pedal_type === "A") {
                pedalLabel.innerText = `엑셀 ${data.pedal}%`;
                pedalLabel.style.color = "#00ffcc";
            } else if (data.pedal_type === "B") {
                pedalLabel.innerText = `브레이크 ${data.pedal}%`;
                pedalLabel.style.color = "#ff3333";
            } else {
                pedalLabel.innerText = "0% (중립)";
                pedalLabel.style.color = "#ffffff";
            }

            motorLabel.innerText = `L: ${Number(data.current_left).toFixed(2)} / R: ${Number(data.current_right).toFixed(2)}`;
            sensorLabel.innerText = `후방(A): ${Number(data.dist_A).toFixed(1)}cm / 전방(B): ${Number(data.dist_B).toFixed(1)}cm`;
            errorText.innerText = data.last_error ? `최근 에러: ${data.last_error}` : "에러 없음";

            camLabel.innerText = "🎥 전방 카메라";
        };
    </script>
</body>
</html>
